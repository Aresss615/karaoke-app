<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#0a0a0f" />
  <title>KaraoKe Machine</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0a0a0f;
      --surface:   #12121a;
      --panel:     #1a1a26;
      --border:    #2a2a40;
      --pink:      #ff2d78;
      --cyan:      #00e5ff;
      --yellow:    #ffe600;
      --green:     #00ff9d;
      --text:      #e0e0f0;
      --muted:     #6060a0;
      --glow-pink: 0 0 12px #ff2d78aa, 0 0 30px #ff2d7844;
      --glow-cyan: 0 0 12px #00e5ffaa, 0 0 30px #00e5ff44;
      --glow-green:0 0 12px #00ff9daa, 0 0 30px #00ff9d44;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Rajdhani', sans-serif;
      font-size: 16px;
      overflow: hidden;
    }

    #app {
      display: flex;
      flex-direction: column;
      height: 100dvh;
      max-width: 480px;
      margin: 0 auto;
      position: relative;
    }

    /* ── Nav ── */
    #nav {
      display: flex;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .nav-btn {
      flex: 1;
      padding: 12px 0;
      background: none;
      border: none;
      color: var(--muted);
      font-family: 'Rajdhani', sans-serif;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      cursor: pointer;
      position: relative;
      transition: color 0.2s;
    }
    .nav-btn::after {
      content: '';
      position: absolute;
      bottom: 0; left: 15%; right: 15%;
      height: 2px;
      background: var(--cyan);
      box-shadow: var(--glow-cyan);
      transform: scaleX(0);
      transition: transform 0.2s;
    }
    .nav-btn.active { color: var(--cyan); }
    .nav-btn.active::after { transform: scaleX(1); }

    /* ── Screens ── */
    .screen {
      display: none;
      flex-direction: column;
      flex: 1;
      overflow: hidden;
    }
    .screen.active { display: flex; }

    /* ══════════════════════════════
       PAD SCREEN
    ══════════════════════════════ */
    #screen-pad {
      padding: 16px 16px 8px;
      gap: 14px;
    }

    /* LED Display */
    #display {
      background: #050508;
      border: 2px solid var(--border);
      border-radius: 10px;
      padding: 14px 18px 12px;
      min-height: 110px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      position: relative;
      overflow: hidden;
      box-shadow: inset 0 0 20px #00000088, 0 0 0 1px #ffffff08;
    }
    #display::before {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        0deg, transparent, transparent 2px, #ffffff04 2px, #ffffff04 4px
      );
      pointer-events: none;
    }
    #display-digits {
      font-family: 'Orbitron', monospace;
      font-size: 42px;
      font-weight: 900;
      letter-spacing: 8px;
      color: var(--cyan);
      text-shadow: var(--glow-cyan);
      line-height: 1;
      min-height: 1em;
    }
    #display-digits.empty {
      color: #1a2a2e;
      text-shadow: none;
    }
    #display-title {
      font-family: 'Rajdhani', sans-serif;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 1px;
      margin-top: 8px;
      min-height: 1.4em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    #display-title.match { color: var(--pink); text-shadow: var(--glow-pink); }
    #display-title.no-match { color: var(--muted); }

    /* Numpad */
    #numpad {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      flex: 1;
    }
    .key {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      font-family: 'Orbitron', monospace;
      font-size: 24px;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 68px;
      transition: background 0.1s, transform 0.08s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      position: relative;
      overflow: hidden;
    }
    .key::after {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at center, #ffffff22 0%, transparent 70%);
      opacity: 0;
      transition: opacity 0.15s;
    }
    .key:active { transform: scale(0.93); }
    .key:active::after { opacity: 1; }

    .key.digit:hover { border-color: var(--cyan); box-shadow: var(--glow-cyan); }
    .key.digit:active { border-color: var(--cyan); background: #001a20; }

    .key.back {
      font-size: 20px;
      color: var(--yellow);
      border-color: #2a2a00;
    }
    .key.back:active { background: #1a1500; border-color: var(--yellow); }

    .key.play {
      grid-column: span 2;
      background: linear-gradient(135deg, #c0006a 0%, #ff2d78 50%, #ff6ba8 100%);
      border: none;
      color: #fff;
      font-size: 18px;
      letter-spacing: 3px;
      box-shadow: var(--glow-pink);
      font-family: 'Rajdhani', sans-serif;
      font-weight: 700;
    }
    .key.play:active { transform: scale(0.96); filter: brightness(0.85); }
    .key.play:disabled {
      background: var(--panel);
      color: var(--muted);
      box-shadow: none;
      border: 1px solid var(--border);
      cursor: default;
    }

    #hint {
      text-align: center;
      font-size: 12px;
      color: var(--muted);
      letter-spacing: 1px;
      padding-bottom: 6px;
      flex-shrink: 0;
    }

    /* ══════════════════════════════
       SONGBOOK SCREEN
    ══════════════════════════════ */
    #screen-book {
      padding: 12px 12px 0;
      gap: 10px;
    }

    #search-wrap {
      position: relative;
      flex-shrink: 0;
    }
    #search-wrap svg {
      position: absolute;
      left: 12px; top: 50%;
      transform: translateY(-50%);
      opacity: 0.4;
      pointer-events: none;
    }
    #search {
      width: 100%;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: 'Rajdhani', sans-serif;
      font-size: 16px;
      font-weight: 500;
      padding: 11px 12px 11px 38px;
      outline: none;
      transition: border-color 0.2s;
    }
    #search:focus { border-color: var(--cyan); box-shadow: var(--glow-cyan); }
    #search::placeholder { color: var(--muted); }

    #genre-tabs {
      display: flex;
      gap: 6px;
      flex-shrink: 0;
      overflow-x: auto;
      padding-bottom: 2px;
      scrollbar-width: none;
    }
    #genre-tabs::-webkit-scrollbar { display: none; }
    .genre-tab {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 20px;
      color: var(--muted);
      font-family: 'Rajdhani', sans-serif;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.8px;
      padding: 6px 13px;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.2s;
      -webkit-tap-highlight-color: transparent;
    }
    .genre-tab.active {
      background: #001a20;
      border-color: var(--cyan);
      color: var(--cyan);
      box-shadow: var(--glow-cyan);
    }

    #song-list {
      flex: 1;
      overflow-y: auto;
      border-radius: 10px;
      padding-bottom: 12px;
      -webkit-overflow-scrolling: touch;
    }
    #song-list::-webkit-scrollbar { width: 3px; }
    #song-list::-webkit-scrollbar-track { background: transparent; }
    #song-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .genre-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
      padding: 14px 4px 6px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 4px;
    }

    .song-row {
      display: flex;
      align-items: center;
      padding: 11px 12px;
      border-radius: 8px;
      cursor: pointer;
      gap: 12px;
      transition: background 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .song-row:active { background: var(--panel); }

    .song-code {
      font-family: 'Orbitron', monospace;
      font-size: 12px;
      font-weight: 700;
      color: var(--cyan);
      min-width: 52px;
      opacity: 0.75;
    }
    .song-info { flex: 1; min-width: 0; }
    .song-title {
      font-size: 15px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: var(--text);
    }
    .song-artist {
      font-size: 12px;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-top: 1px;
    }
    .song-arrow {
      color: var(--pink);
      font-size: 18px;
      opacity: 0.5;
    }

    .no-results {
      text-align: center;
      color: var(--muted);
      font-size: 14px;
      padding: 40px 20px;
      letter-spacing: 1px;
    }

    .machine-header {
      background: linear-gradient(90deg, var(--pink), var(--cyan), var(--green));
      height: 3px;
      flex-shrink: 0;
    }

    @keyframes flash {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
    .flash { animation: flash 0.12s 3; }
  </style>
</head>

    <div id="hint">BROWSE SONGBOOK FOR CODES</div>
  </section>

  <!-- SONGBOOK SCREEN -->

    <div id="genre-tabs">

      <button class="genre-tab" data-genre="uncle" onclick="setGenre('uncle')">UNCLE CLASSICS</button>
      <button class="genre-tab" data-genre="ilocano" onclick="setGenre('ilocano')">ILOCANO</button>
    </div>

    <div id="song-list"></div>
  </section>
</div>

  { code: '50008', title: 'Agyaman Ak Kenka',         artist: 'Traditional',         genre: 'ilocano' },
  { code: '50009', title: 'Dungdungwen Kanto',        artist: 'Traditional',         genre: 'ilocano' },
  { code: '50010', title: 'Nalayag A Balasang',       artist: 'Traditional',         genre: 'ilocano' },
];

const GENRE_LABELS = {
  opm:     'OPM / TAGALOG',
  pop:     'ENGLISH POP / ROCK',
  '90s':   '90s / 2000s HITS',
  uncle:   'UNCLE CLASSICS (FILIPINO)',
  ilocano: 'ILOCANO',
};

const SONG_MAP = Object.fromEntries(SONGS.map(s => [s.code, s]));

let digits = '';
let activeGenre = 'all';

function pressDigit(d) {
  if (digits.length >= 5) return;
  digits += d;
  updateDisplay();
}

function pressBack() {
  digits = digits.slice(0, -1);
  updateDisplay();
}

function updateDisplay() {
  const el = document.getElementById('display-digits');
  const titleEl = document.getElementById('display-title');
  const playBtn = document.getElementById('play-btn');

  if (!digits) {
    el.className = 'empty';
    el.textContent = '_ _ _ _ _';
    titleEl.className = 'no-match';
    titleEl.textContent = 'ENTER 5-DIGIT SONG CODE';
    playBtn.disabled = true;
    return;
  }

  const padded = (digits + '_____').slice(0, 5).split('').join(' ');
  el.className = '';
  el.textContent = padded;

  const song = digits.length === 5 ? SONG_MAP[digits] : null;
  if (song) {
    titleEl.className = 'match';
    titleEl.textContent = `${song.title}  —  ${song.artist}`;
    playBtn.disabled = false;
  } else {
    titleEl.className = 'no-match';
    titleEl.textContent = digits.length === 5 ? 'NO SONG FOUND' : 'ENTER SONG CODE';
    playBtn.disabled = digits.length < 5;
  }
}

function pressPlay() {
  if (digits.length < 5) return;
  const song = SONG_MAP[digits];
  if (!song) return;

  const el = document.getElementById('display-digits');
  el.classList.add('flash');
  el.addEventListener('animationend', () => el.classList.remove('flash'), { once: true });

  const query = encodeURIComponent(`${song.title} ${song.artist} karaoke`);
  window.open(`https://www.youtube.com/results?search_query=${query}`, '_blank');
}

function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('screen-' + name).classList.add('active');
  document.querySelector(`[data-screen="${name}"]`).classList.add('active');
  if (name === 'book') renderSongs();
}

function setGenre(g) {
  activeGenre = g;
  document.querySelectorAll('.genre-tab').forEach(t => {
    t.classList.toggle('active', t.dataset.genre === g);
  });
  renderSongs();
}

function filterSongs() { renderSongs(); }

function renderSongs() {
  const query = document.getElementById('search').value.trim().toLowerCase();
  const list = document.getElementById('song-list');

  let filtered = SONGS.filter(s => {
    const genreMatch = activeGenre === 'all' || s.genre === activeGenre;
    const textMatch = !query ||
      s.title.toLowerCase().includes(query) ||
      s.artist.toLowerCase().includes(query) ||
      s.code.includes(query);
    return genreMatch && textMatch;
  });

  if (!filtered.length) {
    list.innerHTML = '<div class="no-results">NO SONGS FOUND</div>';
    return;
  }

  const grouped = {};
  filtered.forEach(s => {
    if (!grouped[s.genre]) grouped[s.genre] = [];
    grouped[s.genre].push(s);
  });

  const order = ['opm', 'pop', '90s', 'uncle', 'ilocano'];
  let html = '';
  order.forEach(g => {
    if (!grouped[g]) return;
    if (activeGenre === 'all' || query) {
      html += `<div class="genre-label">${GENRE_LABELS[g]}</div>`;
    }
    grouped[g].forEach(s => {
      html += `
        <div class="song-row" onclick="selectSong('${s.code}')">
          <span class="song-code">${s.code}</span>
          <div class="song-info">
            <div class="song-title">${escHtml(s.title)}</div>
            <div class="song-artist">${escHtml(s.artist)}</div>
          </div>
          <span class="song-arrow">&#9654;</span>
        </div>`;
    });
  });

  list.innerHTML = html;
}

function selectSong(code) {
  digits = code;
  updateDisplay();
  showScreen('pad');
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

updateDisplay();
renderSongs();
</script>
</body>
</html>
