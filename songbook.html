<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Karaoke Songbook</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    /* ── Screen styles ── */
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0a0a0f;
      color: #e0e0f0;
      font-family: 'Rajdhani', sans-serif;
      padding: 24px 16px;
    }

    .cover {
      text-align: center;
      padding: 32px 0 40px;
      border-bottom: 2px solid #2a2a40;
      margin-bottom: 32px;
    }
    .cover-bar {
      height: 4px;
      background: linear-gradient(90deg, #ff2d78, #00e5ff, #00ff9d);
      border-radius: 2px;
      margin-bottom: 24px;
    }
    .cover h1 {
      font-family: 'Orbitron', monospace;
      font-size: 28px;
      font-weight: 900;
      letter-spacing: 4px;
      color: #00e5ff;
      text-shadow: 0 0 20px #00e5ffaa;
    }
    .cover p {
      margin-top: 8px;
      font-size: 13px;
      letter-spacing: 2px;
      color: #6060a0;
    }
    .cover .total {
      display: inline-block;
      margin-top: 16px;
      background: #1a1a26;
      border: 1px solid #2a2a40;
      border-radius: 20px;
      padding: 6px 18px;
      font-size: 13px;
      color: #ff2d78;
      font-weight: 700;
      letter-spacing: 1px;
    }

    /* Print button */
    .print-btn {
      display: block;
      margin: 0 auto 32px;
      background: linear-gradient(135deg, #c0006a, #ff2d78);
      border: none;
      border-radius: 10px;
      color: #fff;
      font-family: 'Rajdhani', sans-serif;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 2px;
      padding: 12px 32px;
      cursor: pointer;
      box-shadow: 0 0 12px #ff2d78aa;
    }
    .print-btn:active { filter: brightness(0.85); }

    /* Genre section */
    .genre-section { margin-bottom: 36px; }
    .genre-heading {
      font-family: 'Orbitron', monospace;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 3px;
      color: #00e5ff;
      text-shadow: 0 0 8px #00e5ff88;
      padding: 10px 0 8px;
      border-bottom: 1px solid #2a2a40;
      margin-bottom: 2px;
      text-transform: uppercase;
    }

    /* Song table */
    table {
      width: 100%;
      border-collapse: collapse;
    }
    tr:nth-child(even) td { background: #12121a; }
    td {
      padding: 7px 8px;
      vertical-align: middle;
    }
    .td-code {
      font-family: 'Orbitron', monospace;
      font-size: 12px;
      font-weight: 700;
      color: #00e5ff;
      opacity: 0.8;
      width: 70px;
      white-space: nowrap;
    }
    .td-title {
      font-size: 14px;
      font-weight: 600;
      color: #e0e0f0;
    }
    .td-artist {
      font-size: 12px;
      color: #6060a0;
      text-align: right;
      white-space: nowrap;
    }

    /* ── Print styles ── */
    @media print {
      body {
        background: #fff !important;
        color: #000 !important;
        padding: 0;
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }

      .print-btn { display: none !important; }
      .cover { border-bottom: 2px solid #000; }
      .cover-bar { background: #000 !important; }
      .cover h1 { color: #000 !important; text-shadow: none !important; font-size: 22px; }
      .cover p, .cover .total { color: #444 !important; background: #f0f0f0 !important; border-color: #ccc !important; }

      .genre-heading {
        color: #000 !important;
        text-shadow: none !important;
        border-bottom: 2px solid #000;
        font-size: 10px;
        padding: 6px 0 4px;
      }
      .genre-section { margin-bottom: 20px; page-break-inside: avoid; }

      table { width: 100%; }
      tr:nth-child(even) td { background: #f5f5f5 !important; }
      td { padding: 4px 6px; border-bottom: 1px solid #e0e0e0; }

      .td-code { color: #0044aa !important; font-size: 10px; }
      .td-title { color: #000 !important; font-size: 12px; }
      .td-artist { color: #555 !important; font-size: 11px; }

      /* 2-column layout on print */
      .songbook-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 0 32px;
      }
    }

    /* 2-col on wide screens too */
    @media (min-width: 700px) {
      body { padding: 32px 40px; }
      .songbook-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 0 40px;
      }
    }
  </style>
</head>
<body>

<div class="cover">
  <div class="cover-bar"></div>
  <h1>KARAOKE SONGBOOK</h1>
  <p>SONG CODE DIRECTORY</p>
  <div class="total" id="total-count"></div>
</div>

<button class="print-btn" onclick="window.print()">&#128438; PRINT SONGBOOK</button>

<div class="songbook-grid" id="songbook-grid"></div>

  { code: '10005', title: 'Leaves',                   artist: 'Ben&Ben',             genre: 'opm' },

  { code: '10008', title: 'Pano',                     artist: 'Zack Tabudlo',        genre: 'opm' },
  { code: '10009', title: 'Ikaw At Ako',              artist: 'Moira Dela Torre',    genre: 'opm' },

  { code: '10016', title: 'Buwan',                    artist: 'Juan Karlos',         genre: 'opm' },

  { code: '20005', title: 'A Thousand Years',         artist: 'Christina Perri',     genre: 'pop' },
  { code: '20006', title: 'Fix You',                  artist: 'Coldplay',            genre: 'pop' },
  { code: '20007', title: 'The Scientist',            artist: 'Coldplay',            genre: 'pop' },
  { code: '20008', title: 'Yellow',                   artist: 'Coldplay',            genre: 'pop' },
  { code: '20009', title: 'Perfect',                  artist: 'Ed Sheeran',          genre: 'pop' },
  { code: '20010', title: 'Shape of You',             artist: 'Ed Sheeran',          genre: 'pop' },

  { code: '20016', title: 'November Rain',            artist: "Guns N' Roses",       genre: 'pop' },
  { code: '20017', title: "Sweet Child O' Mine",      artist: "Guns N' Roses",       genre: 'pop' },
  { code: '20018', title: 'Wonderwall',               artist: 'Oasis',               genre: 'pop' },
  { code: '20019', title: 'Hotel California',         artist: 'Eagles',              genre: 'pop' },
  { code: '20020', title: "Don't Stop Believin'",     artist: 'Journey',             genre: 'pop' },
  // 90s / 2000s
  { code: '30001', title: 'I Want It That Way',       artist: 'Backstreet Boys',     genre: '90s' },
  { code: '30002', title: 'Larger Than Life',         artist: 'Backstreet Boys',     genre: '90s' },
  { code: '30003', title: 'Bye Bye Bye',              artist: 'NSYNC',               genre: '90s' },
  { code: '30004', title: "Tearin' Up My Heart",      artist: 'NSYNC',               genre: '90s' },

  { code: '30006', title: "Say You'll Be There",      artist: 'Spice Girls',         genre: '90s' },
  { code: '30007', title: '...Baby One More Time',    artist: 'Britney Spears',      genre: '90s' },
  { code: '30008', title: 'Oops!... I Did It Again',  artist: 'Britney Spears',      genre: '90s' },
  { code: '30009', title: 'My Heart Will Go On',      artist: 'Celine Dion',         genre: '90s' },
  { code: '30010', title: 'Because You Loved Me',     artist: 'Celine Dion',         genre: '90s' },
  { code: '30011', title: 'Hero',                     artist: 'Mariah Carey',        genre: '90s' },
  { code: '30012', title: 'Always Be My Baby',        artist: 'Mariah Carey',        genre: '90s' },
  { code: '30013', title: 'No Scrubs',                artist: 'TLC',                 genre: '90s' },
  { code: '30014', title: 'Waterfalls',               artist: 'TLC',                 genre: '90s' },
  { code: '30015', title: "Livin' La Vida Loca",      artist: 'Ricky Martin',        genre: '90s' },
  { code: '30016', title: 'She Bangs',                artist: 'Ricky Martin',        genre: '90s' },
  { code: '30017', title: 'Smooth',                   artist: 'Santana ft. Rob Thomas', genre: '90s' },
  { code: '30018', title: 'Mambo No. 5',              artist: 'Lou Bega',            genre: '90s' },
  { code: '30019', title: 'Genie in a Bottle',        artist: 'Christina Aguilera',  genre: '90s' },
  { code: '30020', title: 'Beautiful',                artist: 'Christina Aguilera',  genre: '90s' },
  // Ilocano
  { code: '50001', title: 'Pamulinawen',              artist: 'Traditional',         genre: 'ilocano' },
  { code: '50002', title: 'Manang Biday',             artist: 'Traditional',         genre: 'ilocano' },
  { code: '50003', title: 'Naimbag A Bigat',          artist: 'Traditional',         genre: 'ilocano' },
  { code: '50004', title: 'Laji',                     artist: 'Traditional',         genre: 'ilocano' },
  { code: '50005', title: 'Sa Kabukiran',             artist: 'Traditional',         genre: 'ilocano' },
  { code: '50006', title: 'Palong-Palong',            artist: 'Traditional',         genre: 'ilocano' },
  { code: '50007', title: 'Ay Kari',                  artist: 'Traditional',         genre: 'ilocano' },
  { code: '50008', title: 'Agyaman Ak Kenka',         artist: 'Traditional',         genre: 'ilocano' },
  { code: '50009', title: 'Dungdungwen Kanto',        artist: 'Traditional',         genre: 'ilocano' },
  { code: '50010', title: 'Nalayag A Balasang',       artist: 'Traditional',         genre: 'ilocano' },
];

const GENRE_META = [
  { key: 'opm',     label: 'OPM / TAGALOG',           range: '10001–10999' },
  { key: 'pop',     label: 'ENGLISH POP / ROCK',       range: '20001–20999' },
  { key: '90s',     label: '90s / 2000s HITS',         range: '30001–30999' },
  { key: 'ilocano', label: 'ILOCANO',                  range: '50001–50999' },
];

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// Render
document.getElementById('total-count').textContent = `${SONGS.length} SONGS`;

const grid = document.getElementById('songbook-grid');
GENRE_META.forEach(({ key, label, range }) => {
  const songs = SONGS.filter(s => s.genre === key);
  if (!songs.length) return;

  const sec = document.createElement('div');
  sec.className = 'genre-section';

  let rows = songs.map(s => `
    <tr>
      <td class="td-code">${s.code}</td>
      <td class="td-title">${escHtml(s.title)}</td>
      <td class="td-artist">${escHtml(s.artist)}</td>
    </tr>`).join('');

  sec.innerHTML = `
    <div class="genre-heading">${label} <span style="opacity:.4;font-size:10px;margin-left:8px;">${range}</span></div>
    <table><tbody>${rows}</tbody></table>`;

  grid.appendChild(sec);
});
</script>
</body>
</html>
