<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Karaoke Songbook</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    /* ── Screen styles ── */
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0a0a0f;
      color: #e0e0f0;
      font-family: 'Rajdhani', sans-serif;
      padding: 24px 16px;
    }

    .cover {
      text-align: center;
      padding: 32px 0 40px;
      border-bottom: 2px solid #2a2a40;
      margin-bottom: 32px;
    }
    .cover-bar {
      height: 4px;
      background: linear-gradient(90deg, #ff2d78, #00e5ff, #00ff9d);
      border-radius: 2px;
      margin-bottom: 24px;
    }
    .cover h1 {
      font-family: 'Orbitron', monospace;
      font-size: 28px;
      font-weight: 900;
      letter-spacing: 4px;
      color: #00e5ff;
      text-shadow: 0 0 20px #00e5ffaa;
    }
    .cover p {
      margin-top: 8px;
      font-size: 13px;
      letter-spacing: 2px;
      color: #6060a0;
    }
    .cover .total {
      display: inline-block;
      margin-top: 16px;
      background: #1a1a26;
      border: 1px solid #2a2a40;
      border-radius: 20px;
      padding: 6px 18px;
      font-size: 13px;
      color: #ff2d78;
      font-weight: 700;
      letter-spacing: 1px;
    }

    /* Print button */
    .print-btn {
      display: block;
      margin: 0 auto 32px;
      background: linear-gradient(135deg, #c0006a, #ff2d78);
      border: none;
      border-radius: 10px;
      color: #fff;
      font-family: 'Rajdhani', sans-serif;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 2px;
      padding: 12px 32px;
      cursor: pointer;
      box-shadow: 0 0 12px #ff2d78aa;
    }
    .print-btn:active { filter: brightness(0.85); }

    /* Genre section */
    .genre-section { margin-bottom: 36px; }
    .genre-heading {
      font-family: 'Orbitron', monospace;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 3px;
      color: #00e5ff;
      text-shadow: 0 0 8px #00e5ff88;
      padding: 10px 0 8px;
      border-bottom: 1px solid #2a2a40;
      margin-bottom: 2px;
      text-transform: uppercase;
    }

    /* Song table */
    table {
      width: 100%;
      border-collapse: collapse;
    }
    tr:nth-child(even) td { background: #12121a; }
    td {
      padding: 7px 8px;
      vertical-align: middle;
    }
    .td-code {
      font-family: 'Orbitron', monospace;
      font-size: 12px;
      font-weight: 700;
      color: #00e5ff;
      opacity: 0.8;
      width: 70px;
      white-space: nowrap;
    }
    .td-title {
      font-size: 14px;
      font-weight: 600;
      color: #e0e0f0;
    }
    .td-artist {
      font-size: 12px;
      color: #6060a0;
      text-align: right;
      white-space: nowrap;
    }

    /* ── Print styles ── */
    @media print {
      body {
        background: #fff !important;
        color: #000 !important;
        padding: 0;
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }

      .print-btn { display: none !important; }
      .cover { border-bottom: 2px solid #000; }
      .cover-bar { background: #000 !important; }
      .cover h1 { color: #000 !important; text-shadow: none !important; font-size: 22px; }
      .cover p, .cover .total { color: #444 !important; background: #f0f0f0 !important; border-color: #ccc !important; }

      .genre-heading {
        color: #000 !important;
        text-shadow: none !important;
        border-bottom: 2px solid #000;
        font-size: 10px;
        padding: 6px 0 4px;
      }
      .genre-section { margin-bottom: 20px; page-break-inside: avoid; }

      table { width: 100%; }
      tr:nth-child(even) td { background: #f5f5f5 !important; }
      td { padding: 4px 6px; border-bottom: 1px solid #e0e0e0; }

      .td-code { color: #0044aa !important; font-size: 10px; }
      .td-title { color: #000 !important; font-size: 12px; }
      .td-artist { color: #555 !important; font-size: 11px; }

      /* 2-column layout on print */
      .songbook-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 0 32px;
      }
    }

    /* 2-col on wide screens too */
    @media (min-width: 700px) {
      body { padding: 32px 40px; }
      .songbook-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 0 40px;
      }
    }
  </style>
</head>

  { key: 'pop',     label: 'ENGLISH POP / ROCK',       range: '20001–20999' },
  { key: '90s',     label: '90s / 2000s HITS',         range: '30001–30999' },
  { key: 'ilocano', label: 'ILOCANO',                  range: '50001–50999' },
];

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// Render
document.getElementById('total-count').textContent = `${SONGS.length} SONGS`;

const grid = document.getElementById('songbook-grid');
GENRE_META.forEach(({ key, label, range }) => {
  const songs = SONGS.filter(s => s.genre === key);
  if (!songs.length) return;

  const sec = document.createElement('div');
  sec.className = 'genre-section';

  let rows = songs.map(s => `
    <tr>
      <td class="td-code">${s.code}</td>
      <td class="td-title">${escHtml(s.title)}</td>
      <td class="td-artist">${escHtml(s.artist)}</td>
    </tr>`).join('');

  sec.innerHTML = `
    <div class="genre-heading">${label} <span style="opacity:.4;font-size:10px;margin-left:8px;">${range}</span></div>
    <table><tbody>${rows}</tbody></table>`;

  grid.appendChild(sec);
});
